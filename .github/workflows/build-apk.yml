name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Install Flet
        run: pip install flet==0.22.0
      - name: Build APK
        run: flet build apk --app-name "RytoriK"  # <-- sin emoji
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RytoriK-app
          path: build/apk/*.apk